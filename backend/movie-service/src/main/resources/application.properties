server.port=5002
spring.application.name=movie-service

# MongoDB Configuration
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:${SPRING_DATA_MONGODB_URL:${MONGODB_URI:${MONGO_URI:mongodb://localhost:27017/moviedb}}}}

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
upload.dir=${UPLOAD_DIR:./uploads/posters}

# Review service base URL (can be overridden via environment variables in Docker)
review.service.url=${REVIEW_SERVICE_URL:http://localhost:5003}

# Redis Configuration
spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${SPRING_REDIS_SSL:false}
spring.redis.host=${SPRING_REDIS_HOST:localhost}
spring.redis.port=${SPRING_REDIS_PORT:6379}
spring.redis.password=${SPRING_REDIS_PASSWORD:}
spring.redis.ssl=${SPRING_REDIS_SSL:false}
